<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jude's World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
</head>
<body>
    <!-- Title Screen -->
    <div id="title-screen">
        <div class="title-clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>
        <div class="title-content">
            <h1 class="title-text">JUDE'S<br>WORLD</h1>
            <p class="title-subtitle">~ An Adventure Awaits ~</p>
            <button id="start-btn" class="pixel-btn">
                <span class="btn-icon">&#9654;</span> PRESS START
            </button>
        </div>
        <div class="title-ground"></div>
    </div>

    <!-- Game World - Mario-style Overworld Map -->
    <div id="game-world" class="hidden">
        <!-- Map wrapper clips overflow -->
        <div id="map-wrapper">
            <!-- Map container - sized to image aspect ratio by JS -->
            <div id="map">
                <!-- Map image -->
                <img id="map-bg" src="sprites/env/map.png" alt="">
                <!-- Path canvas drawn by JS -->
                <canvas id="map-paths"></canvas>

                <!-- Map Nodes (pin markers) -->
                <div class="map-node" id="node-baseball" data-name="baseball">
                    <div class="pin"></div>
                    <div class="node-label">BASEBALL</div>
                </div>
                <div class="map-node" id="node-tennis" data-name="tennis">
                    <div class="pin"></div>
                    <div class="node-label">TENNIS</div>
                </div>
                <div class="map-node" id="node-cricket" data-name="cricket">
                    <div class="pin"></div>
                    <div class="node-label">CRICKET</div>
                </div>
                <div class="map-node" id="node-bike" data-name="bike">
                    <div class="pin"></div>
                    <div class="node-label">BIKE</div>
                </div>
                <div class="map-node" id="node-dino" data-name="dino">
                    <div class="pin"></div>
                    <div class="node-label">DINOS</div>
                </div>
                <div class="map-node" id="node-beyblade" data-name="beyblade">
                    <div class="pin"></div>
                    <div class="node-label">BEYBLADE</div>
                </div>
                <div class="map-node" id="node-hotwheels" data-name="hotwheels">
                    <div class="pin"></div>
                    <div class="node-label">CARS</div>
                </div>
                <div class="map-node" id="node-lego" data-name="lego">
                    <div class="pin"></div>
                    <div class="node-label">LEGO</div>
                </div>
                <div class="map-node" id="node-movies" data-name="movies">
                    <div class="pin"></div>
                    <div class="node-label">MOVIES</div>
                </div>
                <div class="map-node" id="node-gallery" data-name="gallery">
                    <div class="pin"></div>
                    <div class="node-label">PHOTOS</div>
                </div>

                <!-- Jude Character (walks between nodes) -->
                <div id="jude">
                    <img id="jude-img" class="jude-sprite" src="sprites/jude.png" alt="Jude">
                    <canvas id="jude-sprite" class="jude-sprite hidden" width="128" height="160"></canvas>
                </div>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-left">
                <span class="hud-star">&#9733;</span> JUDE'S WORLD
            </div>
            <div class="hud-right">
                <button id="sound-btn" class="hud-btn" title="Toggle Music">&#9835;</button>
                <button id="gallery-btn" class="hud-btn" title="Photo Gallery">&#128247;</button>
                <button id="home-btn" class="hud-btn" title="Back to Title">&#9751;</button>
            </div>
        </div>

        <!-- Mobile D-Pad -->
        <div id="mobile-controls">
            <button class="ctrl-btn" id="ctrl-up">&#9650;</button>
            <button class="ctrl-btn" id="ctrl-left">&#9664;</button>
            <button class="ctrl-btn" id="ctrl-right">&#9654;</button>
            <button class="ctrl-btn" id="ctrl-down">&#9660;</button>
            <button class="ctrl-btn" id="ctrl-action">&#9733;</button>
        </div>

        <!-- Speech Bubble -->
        <div id="speech-bubble" class="hidden">
            <div id="speech-text"></div>
            <div id="speech-close">&#10005;</div>
        </div>

        <!-- Detail Card (appears when pin is clicked) -->
        <div id="detail-card" class="hidden">
            <button id="detail-close">&#10005;</button>
            <img id="detail-img" src="" alt="">
            <h2 id="detail-title"></h2>
            <p id="detail-desc"></p>
            <a id="detail-action" class="detail-btn" href="#">Explore</a>
        </div>
    </div>

    <!-- Photo Gallery Modal -->
    <div id="gallery-modal" class="modal hidden">
        <div class="modal-content gallery-content">
            <div class="modal-header">
                <h2>&#128247; JUDE'S PHOTOS</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="gallery-grid"></div>
            <p class="gallery-empty" id="gallery-empty">No photos yet! Add images to the <code>photos/</code> folder.</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="hidden">
        <img id="lightbox-img" src="" alt="">
        <button id="lightbox-close">&times;</button>
        <button id="lightbox-prev">&#9664;</button>
        <button id="lightbox-next">&#9654;</button>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal hidden">
        <div class="modal-content info-content">
            <div class="modal-header">
                <h2 id="info-title"></h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="info-body"></div>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
