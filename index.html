<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jude's World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
</head>
<body>
    <!-- Title Screen -->
    <div id="title-screen">
        <div class="title-clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>
        <div class="title-content">
            <h1 class="title-text">JUDE'S<br>WORLD</h1>
            <p class="title-subtitle">~ An Adventure Awaits ~</p>
            <button id="start-btn" class="pixel-btn">
                <span class="btn-icon">&#9654;</span> PRESS START
            </button>
        </div>
        <div class="title-ground"></div>
    </div>

    <!-- Game World - Free roaming -->
    <div id="game-world" class="hidden">
        <!-- Background -->
        <img id="world-bg" src="sprites/env/world.png" alt="">

        <!-- Stations (Jude walks up to these) -->
        <div class="station" id="sta-bike" data-name="bike">
            <img class="station-icon" src="sprites/bike.png" alt="Bike">
            <div class="station-label">BIKE</div>
        </div>
        <div class="station" id="sta-baseball" data-name="baseball">
            <img class="station-icon" src="sprites/baseball.png" alt="Baseball">
            <div class="station-label">BASEBALL</div>
        </div>
        <div class="station" id="sta-beyblade" data-name="beyblade">
            <img class="station-icon" src="sprites/beyblade.png" alt="Beyblade">
            <div class="station-label">BEYBLADE</div>
        </div>
        <div class="station" id="sta-dino" data-name="dino">
            <img class="station-icon" src="sprites/dino.png" alt="Dinos">
            <div class="station-label">DINOS</div>
        </div>
        <div class="station" id="sta-hotwheels" data-name="hotwheels">
            <img class="station-icon" src="sprites/hotwheels.png" alt="Cars">
            <div class="station-label">CARS</div>
        </div>
        <div class="station" id="sta-lego" data-name="lego">
            <img class="station-icon" src="sprites/lego.png" alt="Lego">
            <div class="station-label">LEGO</div>
        </div>
        <div class="station" id="sta-movies" data-name="movies">
            <img class="station-icon" src="sprites/movies.png" alt="Movies">
            <div class="station-label">MOVIES</div>
        </div>
        <div class="station" id="sta-gallery" data-name="gallery">
            <img class="station-icon" src="sprites/gallery.png" alt="Photos">
            <div class="station-label">PHOTOS</div>
        </div>
        <div class="station" id="sta-tennis" data-name="tennis">
            <img class="station-icon" src="sprites/tennis.png" alt="Tennis">
            <div class="station-label">TENNIS</div>
        </div>
        <div class="station" id="sta-cricket" data-name="cricket">
            <img class="station-icon" src="sprites/cricket.png" alt="Cricket">
            <div class="station-label">CRICKET</div>
        </div>

        <!-- Jude Character (free roaming) -->
        <div id="jude">
            <img id="jude-img" class="jude-sprite" src="sprites/jude.png" alt="Jude">
            <canvas id="jude-sprite" class="jude-sprite hidden" width="128" height="160"></canvas>
            <div id="jude-name">JUDE</div>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-left">
                <span class="hud-star">&#9733;</span> JUDE'S WORLD
            </div>
            <div class="hud-right">
                <button id="sound-btn" class="hud-btn" title="Toggle Music">&#9835;</button>
                <button id="gallery-btn" class="hud-btn" title="Photo Gallery">&#128247;</button>
                <button id="home-btn" class="hud-btn" title="Back to Title">&#9751;</button>
            </div>
        </div>

        <!-- Mobile D-Pad -->
        <div id="mobile-controls">
            <button class="ctrl-btn" id="ctrl-up">&#9650;</button>
            <button class="ctrl-btn" id="ctrl-left">&#9664;</button>
            <button class="ctrl-btn" id="ctrl-right">&#9654;</button>
            <button class="ctrl-btn" id="ctrl-down">&#9660;</button>
            <button class="ctrl-btn" id="ctrl-action">&#9733;</button>
        </div>

        <!-- Speech Bubble -->
        <div id="speech-bubble" class="hidden">
            <div id="speech-text"></div>
            <div id="speech-close">&#10005;</div>
        </div>

        <!-- Detail Card (appears when pin is clicked) -->
        <div id="detail-card" class="hidden">
            <button id="detail-close">&#10005;</button>
            <img id="detail-img" src="" alt="">
            <h2 id="detail-title"></h2>
            <p id="detail-desc"></p>
            <a id="detail-action" class="detail-btn" href="#">Explore</a>
        </div>
    </div>

    <!-- Photo Gallery Modal -->
    <div id="gallery-modal" class="modal hidden">
        <div class="modal-content gallery-content">
            <div class="modal-header">
                <h2>&#128247; JUDE'S PHOTOS</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="gallery-grid"></div>
            <p class="gallery-empty" id="gallery-empty">No photos yet! Add images to the <code>photos/</code> folder.</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="hidden">
        <img id="lightbox-img" src="" alt="">
        <button id="lightbox-close">&times;</button>
        <button id="lightbox-prev">&#9664;</button>
        <button id="lightbox-next">&#9654;</button>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal hidden">
        <div class="modal-content info-content">
            <div class="modal-header">
                <h2 id="info-title"></h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="info-body"></div>
        </div>
    </div>

    <script src="script.js?v=6"></script>
</body>
</html>
