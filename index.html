<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jude's World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
</head>
<body>
    <!-- Title Screen -->
    <div id="title-screen">
        <div class="title-clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>
        <div class="title-content">
            <h1 class="title-text">JUDE'S<br>WORLD</h1>
            <p class="title-subtitle">~ An Adventure Awaits ~</p>
            <button id="start-btn" class="pixel-btn">
                <span class="btn-icon">&#9654;</span> PRESS START
            </button>
        </div>
        <div class="title-ground"></div>
    </div>

    <!-- Game World -->
    <div id="game-world" class="hidden">
        <!-- Pixel art background -->
        <img id="game-bg" src="sprites/env/background.png" alt="">

        <!-- Sky & Scenery -->
        <div id="sky">
            <div class="sun"></div>
            <div class="cloud game-cloud gc-1"></div>
            <div class="cloud game-cloud gc-2"></div>
            <div class="cloud game-cloud gc-3"></div>
            <div class="cloud game-cloud gc-4"></div>
            <div class="bird bird-1"></div>
            <div class="bird bird-2"></div>
        </div>

        <!-- Parallax Hills -->
        <div id="hills">
            <div class="hill hill-back"></div>
            <div class="hill hill-mid"></div>
            <div class="hill hill-front"></div>
        </div>

        <!-- Ground Layer -->
        <div id="ground">

            <!-- ===== AREA 1: SPORTS FIELD ===== -->
            <div class="area-sign" id="sign-sports">
                <div class="sign-text">SPORTS FIELD</div>
            </div>
            <div class="world-object" id="obj-baseball" data-name="baseball" title="Baseball">
                <div class="sprite-container" data-icon="baseball">
                    <img class="obj-sprite sprite-img" src="sprites/baseball.png" alt="Baseball">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">BASEBALL</div>
            </div>
            <div class="world-object" id="obj-tennis" data-name="tennis" title="Tennis">
                <div class="sprite-container" data-icon="tennis">
                    <img class="obj-sprite sprite-img" src="sprites/tennis.png" alt="Tennis">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">TENNIS</div>
            </div>
            <div class="world-object" id="obj-cricket" data-name="cricket" title="Cricket">
                <div class="sprite-container" data-icon="cricket">
                    <img class="obj-sprite sprite-img" src="sprites/cricket.png" alt="Cricket">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">CRICKET</div>
            </div>

            <!-- Area separator -->
            <div class="area-separator sep-1"></div>

            <!-- ===== AREA 2: ADVENTURE ZONE ===== -->
            <div class="area-sign" id="sign-adventure">
                <div class="sign-text">ADVENTURE</div>
            </div>
            <div class="world-object" id="obj-bike" data-name="bike" title="Jude's Bike">
                <div class="sprite-container" data-icon="bike">
                    <img class="obj-sprite sprite-img" src="sprites/bike.png" alt="Bike">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">BIKE</div>
            </div>
            <div class="world-object" id="obj-dino" data-name="dino" title="Dino Land">
                <div class="sprite-container" data-icon="dino">
                    <img class="obj-sprite sprite-img" src="sprites/dino.png" alt="Dinos">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">DINOS</div>
            </div>

            <!-- Area separator -->
            <div class="area-separator sep-2"></div>

            <!-- ===== AREA 3: TOY WORKSHOP ===== -->
            <div class="area-sign" id="sign-toys">
                <div class="sign-text">TOY WORKSHOP</div>
            </div>
            <div class="world-object" id="obj-beyblade" data-name="beyblade" title="Beyblade Arena">
                <div class="sprite-container" data-icon="beyblade">
                    <img class="obj-sprite sprite-img" src="sprites/beyblade.png" alt="Beyblade">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">BEYBLADE</div>
            </div>
            <div class="world-object" id="obj-hotwheels" data-name="hotwheels" title="Hot Wheels">
                <div class="sprite-container" data-icon="hotwheels">
                    <img class="obj-sprite sprite-img" src="sprites/hotwheels.png" alt="Cars">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">CARS</div>
            </div>
            <div class="world-object" id="obj-lego" data-name="lego" title="Lego Workshop">
                <div class="sprite-container" data-icon="lego">
                    <img class="obj-sprite sprite-img" src="sprites/lego.png" alt="Lego">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">LEGO</div>
            </div>

            <!-- Area separator -->
            <div class="area-separator sep-3"></div>

            <!-- ===== AREA 4: FUN CORNER ===== -->
            <div class="area-sign" id="sign-fun">
                <div class="sign-text">FUN CORNER</div>
            </div>
            <div class="world-object" id="obj-movies" data-name="movies" title="Movies">
                <div class="sprite-container" data-icon="movies">
                    <img class="obj-sprite sprite-img" src="sprites/movies.png" alt="Movies">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">MOVIES</div>
            </div>
            <div class="world-object" id="obj-gallery" data-name="gallery" title="Photo Gallery">
                <div class="sprite-container" data-icon="gallery">
                    <img class="obj-sprite sprite-img" src="sprites/gallery.png" alt="Photos">
                    <canvas class="obj-sprite sprite-fallback hidden" width="144" height="144"></canvas>
                </div>
                <div class="obj-label">PHOTOS</div>
            </div>

            <!-- Jude Character -->
            <div id="jude">
                <img id="jude-img" class="jude-sprite" src="sprites/jude.png" alt="Jude">
                <canvas id="jude-sprite" class="jude-sprite hidden" width="128" height="160"></canvas>
                <div id="jude-name">JUDE</div>
            </div>
        </div>

        <!-- Ground Tiles -->
        <div id="ground-tiles"></div>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-left">
                <span class="hud-star">&#9733;</span> JUDE'S WORLD
            </div>
            <div class="hud-right">
                <button id="sound-btn" class="hud-btn" title="Toggle Music">&#9835;</button>
                <button id="gallery-btn" class="hud-btn" title="Photo Gallery">&#128247;</button>
                <button id="home-btn" class="hud-btn" title="Back to Title">&#9751;</button>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <button class="ctrl-btn" id="ctrl-left">&#9664;</button>
            <button class="ctrl-btn" id="ctrl-right">&#9654;</button>
            <button class="ctrl-btn" id="ctrl-action">&#9733;</button>
        </div>

        <!-- Speech Bubble -->
        <div id="speech-bubble" class="hidden">
            <div id="speech-text"></div>
            <div id="speech-close">&#10005;</div>
        </div>
    </div>

    <!-- Photo Gallery Modal -->
    <div id="gallery-modal" class="modal hidden">
        <div class="modal-content gallery-content">
            <div class="modal-header">
                <h2>&#128247; JUDE'S PHOTOS</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="gallery-grid"></div>
            <p class="gallery-empty" id="gallery-empty">No photos yet! Add images to the <code>photos/</code> folder.</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="hidden">
        <img id="lightbox-img" src="" alt="">
        <button id="lightbox-close">&times;</button>
        <button id="lightbox-prev">&#9664;</button>
        <button id="lightbox-next">&#9654;</button>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal hidden">
        <div class="modal-content info-content">
            <div class="modal-header">
                <h2 id="info-title"></h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="info-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
